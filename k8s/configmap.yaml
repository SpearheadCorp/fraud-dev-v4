---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fraud-det-v31
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: 'dcgm'
        static_configs:
          - targets: ['nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400']

      - job_name: 'backend'
        static_configs:
          - targets: ['backend:8080']
        metrics_path: '/metrics'

      - job_name: 'triton'
        static_configs:
          - targets: ['inference:8002']
