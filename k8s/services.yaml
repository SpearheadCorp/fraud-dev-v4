---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fraud-det-v31
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880

---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: fraud-det-v31
spec:
  type: ClusterIP
  selector:
    app: inference
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: metrics
      port: 8002
      targetPort: 8002

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: fraud-det-v31
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090

# dcgm-exporter service removed — using gpu-operator's existing nvidia-dcgm-exporter service
