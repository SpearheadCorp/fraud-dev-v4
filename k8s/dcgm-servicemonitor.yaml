apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack   # must match Prometheus serviceMonitorSelector
spec:
  namespaceSelector:
    matchNames:
      - gpu-operator
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter      # label on nvidia-dcgm-exporter service
  endpoints:
    - port: gpu-metrics
      interval: 15s
      path: /metrics
