# Always-on deployments: backend, inference, prometheus, dcgm-exporter
# Pipeline pods (data-gather, data-prep, model-build) are Jobs — see k8s/jobs/

---
# ── Backend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fraud-det-v31
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        kubernetes.io/hostname: slc6-lg-n3-b30-29
      serviceAccountName: backend-sa
      containers:
        - name: backend
          image: 10.23.181.247:5000/fraud-det-v31/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: K8S_NAMESPACE
              value: fraud-det-v31
            - name: PROMETHEUS_URL
              value: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
            - name: RAW_DATA_PATH
              value: /data/raw
            - name: FEATURES_DATA_PATH
              value: /data/features
            - name: FEATURES_CPU_DATA_PATH
              value: /data/features-cpu
            - name: MODEL_REPO_PATH
              value: /data/models
            - name: KAGGLE_SEED_PATH
              value: /app/seed-data/credit_card_transactions.csv.zip
            - name: NUM_WORKERS
              value: "8"
            - name: CHUNK_SIZE
              value: "100000"
            - name: TARGET_ROWS
              value: "1000000"
            - name: MAX_SAMPLES
              value: "500000"
          volumeMounts:
            - name: raw-data
              mountPath: /data/raw
            - name: features-data
              mountPath: /data/features
            - name: features-cpu-data
              mountPath: /data/features-cpu
            - name: model-repo
              mountPath: /data/models
          readinessProbe:
            httpGet:
              path: /api/status
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: raw-data
          persistentVolumeClaim:
            claimName: raw-data-pvc
        - name: features-data
          persistentVolumeClaim:
            claimName: features-data-pvc
        - name: features-cpu-data
          persistentVolumeClaim:
            claimName: features-cpu-data-pvc
        - name: model-repo
          persistentVolumeClaim:
            claimName: model-repo-pvc

---
# ── Inference (Triton) ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: fraud-det-v31
spec:
  replicas: 0
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      nodeSelector:
        kubernetes.io/hostname: slc6-lg-n3-b30-29
      containers:
        - name: inference
          image: 10.23.181.247:5000/fraud-det-v31/inference:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000   # HTTP
            - containerPort: 8001   # gRPC
            - containerPort: 8002   # Metrics
          env:
            - name: MODEL_REPO
              value: /data/models
          volumeMounts:
            - name: model-repo
              mountPath: /data/models
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
      volumes:
        - name: model-repo
          persistentVolumeClaim:
            claimName: model-repo-pvc

# NOTE: Prometheus is provided by the cluster (kube-prometheus-stack in monitoring namespace).
# Backend queries it at kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
# dcgm-exporter is provided by the gpu-operator in the gpu-operator namespace.

---
