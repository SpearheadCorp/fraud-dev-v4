  replicas: 0
  selector:
    matchLabels:
      app: inference-cpu
  template:
    metadata:
      labels:
        app: inference-cpu
    spec:
      nodeSelector:
        kubernetes.io/hostname: slc6-lg-n3-b30-29
      containers:
        - name: inference-cpu
          image: 10.23.181.247:5000/fraud-det-v31/inference-cpu:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000   # HTTP
            - containerPort: 8001   # gRPC
            - containerPort: 8002   # Metrics
          env:
            - name: MODEL_REPO
              value: /data/models
          volumeMounts:
            - name: model-repo
              mountPath: /data/models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 20
      volumes:
        - name: model-repo
          persistentVolumeClaim:
            claimName: model-repo-pvc
